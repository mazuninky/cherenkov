<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cherenkov echo demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        min-height: 100vh;
        box-sizing: border-box;
      }
      iframe {
        border: 1px solid #888;
        border-radius: 8px;
        width: 100%;
        height: 100%;
        min-height: 400px;
      }
      h1 {
        grid-column: 1 / -1;
        margin: 0 0 0.5rem;
      }
      p.note {
        grid-column: 1 / -1;
        margin: 0 0 1rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Cherenkov echo demo</h1>
    <p class="note">
      Two iframes, each opening an independent WebSocket to
      <code>ws://127.0.0.1:7000/connect/v1</code>. They subscribe to
      <code>rooms.lobby</code> and exchange messages through the hub.
    </p>
    <iframe src="./client.html?nick=alice" title="Alice"></iframe>
    <iframe src="./client.html?nick=bob" title="Bob"></iframe>
  </body>
</html>
