<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cherenkov live cursors</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        cursor: none;
      }
      #stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        background:
          repeating-linear-gradient(0deg, rgba(127, 127, 127, 0.08) 0 1px, transparent 1px 32px),
          repeating-linear-gradient(90deg, rgba(127, 127, 127, 0.08) 0 1px, transparent 1px 32px);
      }
      header {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 12px;
        align-items: baseline;
        font-size: 0.85rem;
        color: #888;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(127, 127, 127, 0.3);
        border-radius: 6px;
        padding: 6px 10px;
        pointer-events: none;
      }
      @media (prefers-color-scheme: dark) {
        header {
          background: rgba(0, 0, 0, 0.55);
        }
      }
      header b {
        color: var(--me-color, #57b);
        font-weight: 600;
      }
      .cursor {
        position: absolute;
        transform: translate(-2px, -2px);
        pointer-events: none;
        will-change: transform;
        transition: transform 80ms linear;
      }
      .cursor svg {
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.3));
      }
      .cursor .label {
        position: absolute;
        top: 18px;
        left: 14px;
        font-size: 0.75rem;
        padding: 2px 6px;
        border-radius: 4px;
        white-space: nowrap;
        color: white;
      }
      .cursor.me .label {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <header>
        Live cursors — you are <b id="me-label">…</b>
        <span class="status" id="status">connecting…</span>
        <span id="peers">0 peers</span>
      </header>
    </div>

    <script type="module">
      // Hand-rolled protobuf helpers — same shape as examples/echo and
      // examples/price-feed. Replaced by the M2 TS SDK eventually.
      function writeVarint(buf, v) {
        while (v >= 0x80) {
          buf.push((v & 0x7f) | 0x80);
          v = Math.floor(v / 128);
        }
        buf.push(v & 0x7f);
      }
      function readVarint(view, off) {
        let v = 0,
          s = 0,
          b;
        do {
          b = view.getUint8(off++);
          v += (b & 0x7f) * 2 ** s;
          s += 7;
        } while (b & 0x80);
        return [v, off];
      }
      const tag = (f, w) => f * 8 + w;
      function encString(buf, f, val) {
        const u8 = new TextEncoder().encode(val);
        writeVarint(buf, tag(f, 2));
        writeVarint(buf, u8.length);
        for (const b of u8) buf.push(b);
      }
      function encUint64(buf, f, val) {
        if (val === 0) return;
        writeVarint(buf, tag(f, 0));
        writeVarint(buf, val);
      }
      function encBytes(buf, f, val) {
        writeVarint(buf, tag(f, 2));
        writeVarint(buf, val.length);
        for (const b of val) buf.push(b);
      }
      function encMsg(buf, f, body) {
        writeVarint(buf, tag(f, 2));
        writeVarint(buf, body.length);
        for (const b of body) buf.push(b);
      }
      function buildSubscribe(rid, ch) {
        const inner = [];
        encUint64(inner, 1, rid);
        encString(inner, 2, ch);
        const outer = [];
        encMsg(outer, 1, inner);
        return new Uint8Array(outer);
      }
      function buildPublish(rid, ch, data) {
        const inner = [];
        encUint64(inner, 1, rid);
        encString(inner, 2, ch);
        encBytes(inner, 3, data);
        const outer = [];
        encMsg(outer, 3, inner);
        return new Uint8Array(outer);
      }
      function decodeServerFrame(bytes) {
        if (bytes.length === 0) return { kind: "empty" };
        const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
        const [t, after] = readVarint(view, 0);
        if ((t & 7) !== 2) return { kind: "unknown" };
        const [len, afterLen] = readVarint(view, after);
        return { kind: "frame", field: Math.floor(t / 8), body: bytes.subarray(afterLen, afterLen + len) };
      }
      function decodePublication(body) {
        const view = new DataView(body.buffer, body.byteOffset, body.byteLength);
        let off = 0,
          channel = "",
          data = new Uint8Array();
        while (off < body.length) {
          const [t, a] = readVarint(view, off);
          off = a;
          const wire = t & 7;
          const field = Math.floor(t / 8);
          if (field === 1 && wire === 2) {
            const [l, al] = readVarint(view, off);
            off = al;
            channel = new TextDecoder().decode(body.subarray(off, off + l));
            off += l;
          } else if (field === 2 && wire === 0) {
            const [, av] = readVarint(view, off);
            off = av;
          } else if (field === 3 && wire === 2) {
            const [l, al] = readVarint(view, off);
            off = al;
            data = body.subarray(off, off + l);
            off += l;
          } else break;
        }
        return { channel, data };
      }

      const room = new URLSearchParams(location.search).get("room") || "lobby";
      const channel = `cursors.${room}`;

      const palette = ["#e63946", "#1d3557", "#06a77d", "#ff7f50", "#7209b7", "#fb8500", "#118ab2", "#06d6a0"];
      const animals = ["otter", "lemur", "wolf", "fox", "owl", "bear", "lynx", "cat", "puma", "stoat"];
      const me = {
        id: crypto.randomUUID().slice(0, 8),
        name: animals[Math.floor(Math.random() * animals.length)] + "-" + Math.floor(Math.random() * 100),
        color: palette[Math.floor(Math.random() * palette.length)],
      };
      document.documentElement.style.setProperty("--me-color", me.color);
      document.getElementById("me-label").textContent = me.name;

      const stage = document.getElementById("stage");
      const status = document.getElementById("status");
      const peersBadge = document.getElementById("peers");

      const cursors = new Map(); // id -> { el, last_seen }

      function ensureCursor(peer) {
        let entry = cursors.get(peer.id);
        if (entry) {
          entry.last_seen = performance.now();
          return entry;
        }
        const el = document.createElement("div");
        el.className = "cursor";
        if (peer.id === me.id) el.classList.add("me");
        el.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 20 20" fill="${peer.color}" stroke="white" stroke-width="0.6">
            <path d="M2 2 L18 8 L9 11 L8 18 Z"/>
          </svg>
          <div class="label" style="background:${peer.color}">${peer.name}</div>
        `;
        stage.appendChild(el);
        entry = { el, last_seen: performance.now(), color: peer.color, name: peer.name };
        cursors.set(peer.id, entry);
        updateBadge();
        return entry;
      }

      function updateBadge() {
        const others = [...cursors.keys()].filter((id) => id !== me.id).length;
        peersBadge.textContent = `${others} peer${others === 1 ? "" : "s"}`;
      }

      // Reap stale cursors (no update in 5s) so departed peers disappear.
      setInterval(() => {
        const now = performance.now();
        for (const [id, entry] of cursors) {
          if (id === me.id) continue;
          if (now - entry.last_seen > 5000) {
            entry.el.remove();
            cursors.delete(id);
          }
        }
        updateBadge();
      }, 1000);

      const url = `ws://${location.hostname || "127.0.0.1"}:7000/connect/v1`;
      const ws = new WebSocket(url);
      ws.binaryType = "arraybuffer";
      let nextRequestId = 1;

      ws.addEventListener("open", () => {
        status.textContent = `connected · ${channel}`;
        ws.send(buildSubscribe(nextRequestId++, channel));
      });
      ws.addEventListener("close", () => (status.textContent = "closed"));
      ws.addEventListener("error", () => (status.textContent = "error"));
      ws.addEventListener("message", (event) => {
        const frame = decodeServerFrame(new Uint8Array(event.data));
        if (frame.kind !== "frame") return;
        if (frame.field !== 3) return;
        const pub = decodePublication(frame.body);
        let peer;
        try {
          peer = JSON.parse(new TextDecoder().decode(pub.data));
        } catch {
          return;
        }
        if (!peer || typeof peer.id !== "string") return;
        if (peer.id === me.id) return; // we already render our own cursor locally
        const entry = ensureCursor(peer);
        entry.el.style.transform = `translate(${peer.x}px, ${peer.y}px)`;
      });

      // Render our own cursor immediately for local responsiveness; remote
      // peers see us once the next mousemove publish lands.
      const myEntry = ensureCursor(me);
      let lastSent = 0;
      let lastX = 0;
      let lastY = 0;
      function publishPosition(x, y) {
        const now = performance.now();
        if (now - lastSent < 33) return; // ~30 Hz cap
        lastSent = now;
        const payload = JSON.stringify({ id: me.id, name: me.name, color: me.color, x, y });
        ws.send(buildPublish(nextRequestId++, channel, new TextEncoder().encode(payload)));
      }
      window.addEventListener("mousemove", (e) => {
        lastX = e.clientX;
        lastY = e.clientY;
        myEntry.el.style.transform = `translate(${lastX}px, ${lastY}px)`;
        if (ws.readyState === WebSocket.OPEN) publishPosition(lastX, lastY);
      });
      window.addEventListener("touchmove", (e) => {
        const t = e.touches[0];
        if (!t) return;
        lastX = t.clientX;
        lastY = t.clientY;
        myEntry.el.style.transform = `translate(${lastX}px, ${lastY}px)`;
        if (ws.readyState === WebSocket.OPEN) publishPosition(lastX, lastY);
      });
    </script>
  </body>
</html>
