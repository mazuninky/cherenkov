name: ci

on:
  push:
    branches: [master]
    paths:
      - "crates/**"
      - "benches/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "clippy.toml"
      - "deny.toml"
      - ".typos.toml"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "crates/**"
      - "benches/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "clippy.toml"
      - "deny.toml"
      - ".typos.toml"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # rust-toolchain.toml pins the channel; CI honours it via rustup.
  RUSTFLAGS: "-D warnings"

jobs:
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Spell-check
        uses: crate-ci/typos@ca8395668a014bffeb39e0463c660f958402e0ff # v1.46.1

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: debug-ubuntu
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cross-OS on push to master; PRs run Linux only to keep feedback fast.
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: ${{ runner.os == 'Linux' && 'debug-ubuntu' || format('test-{0}', matrix.os) }}
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: cargo test
        run: cargo test --workspace --all-features --locked --no-fail-fast

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: debug-ubuntu
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: cargo doc
        run: cargo doc --workspace --no-deps

  msrv:
    name: msrv (1.95)
    runs-on: ubuntu-latest
    # RUSTUP_TOOLCHAIN overrides rust-toolchain.toml so this job exercises
    # the declared MSRV rather than the pinned toolchain.
    env:
      RUSTUP_TOOLCHAIN: "1.95"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: cargo check
        run: cargo check --workspace --all-targets --locked

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@0105f7c440bc8084c17cad47fe92e63049519458 # v2.0.18
        with:
          command: check
          # Full set of cargo-deny checks: advisories, bans, licenses,
          # sources. Configured by deny.toml at the repo root.
          arguments: --all-features

  ci-success:
    name: ci-success
    needs: [typos, fmt, clippy, test, doc, msrv, deny]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any dependency failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - run: echo "All CI checks passed"
